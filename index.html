<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Expert Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div id="start-screen" class="screen">
        <h1>Minecraft Expert</h1>
        <button id="start-btn">Почати гру</button>
    </div>

    <div id="quiz-screen" class="screen hide">
        <div class="header">
            <span id="timer">Час: 15</span>
            <span id="score-display">Бали: 0</span>
        </div>
        <h2 id="question-text">Питання</h2>
        <div id="answers-container"></div>
    </div>

    <div id="result-screen" class="screen hide">
        <h2>Результат</h2>
        <p id="result-text"></p>
        <button id="restart-btn">Спробувати ще</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
